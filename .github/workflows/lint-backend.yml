name: Lint Backend

on:
  push:
    paths-ignore:
      - 'public/**'
      - '.github/workflows/lint-frontend.yml'
  pull_request:
    paths-ignore:
      - 'public/**'
      - '.github/workflows/lint-frontend.yml'

jobs:
  lint-be:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: Install modules
        run: npm install
      - name: Run Backend ESLint
        run: npm run lint-be
