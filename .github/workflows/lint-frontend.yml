name: Lint Frontend

on:
  push:
    paths:
      - 'public/**'
      - 'eslint.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/lint-frontend.yml'
  pull_request:
    paths:
      - 'public/**'
      - 'eslint.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/lint-frontend.yml'

jobs:
  lint-fe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: Install modules
        run: npm install
      - name: Run Frontend ESLint
        run: npm run lint-fe
