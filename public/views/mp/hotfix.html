<!doctype html>
<html>
	<head>
		<link rel="stylesheet" type="text/css" href="/views/tetris.css" />
		<style>
			#stream_bg {
				width: 1920px;
				height: 1080px;
			}

			#playing_fields {
				position: absolute;
				left: 960px;
				top: 47px;
			}

			.box {
				padding: 3px;
				font-size: 24px;
				line-height: 24px;
				right: var(--offset);
			}

			.box-container {
				position: absolute;
				right: var(--offset);
			}

			.board,
			.score {
				--offset: 11px;
			}

			.score {
				--tdiff-anim-duration: 0.2s;
				width: 389px;
				height: 120px;
				top: 0;
			}

			.score .box {
				box-sizing: border-box;
				width: 100%;
				height: 100%;
				padding-top: 8px;
				padding-right: 0;
				right: unset;
				left: unset;
			}

			.score .aligner {
				display: inline-block;
				font-size: 36px;
				line-height: 40px;
			}

			.score .aligner .diff {
				animation: var(--tdiff-anim-duration) ease-out fadeIn;
				opacity: 1;
			}

			.score .tetris_diff {
				margin-top: -40px;
				line-height: 40px;
				animation: var(--tdiff-anim-duration) ease-out fadeOut;
				opacity: 0;
			}

			.score.with_tdiff .tetris_diff {
				animation: var(--tdiff-anim-duration) ease-out fadeIn;
				opacity: 1;
			}

			.score.with_tdiff .aligner .diff {
				animation: var(--tdiff-anim-duration) ease-out fadeOut;
				opacity: 0;
			}

			.aligner div {
				text-align: right;
			}

			.lines,
			.next_piece {
				--offset: 391px;

				width: 138px;
				height: 56px;
			}

			.lines {
				top: 0;

				font-size: 26px;

				align-items: center;
				flex-direction: column;
				display: flex;

				gap: 8px;
			}

			.next_piece {
				top: 83px;
			}

			.board {
				--border-size: 12;

				padding: 3px;
				width: 359px;
				height: 711px;
				top: 111px;
			}

			.hearts,
			.tetris_rate,
			.drought,
			.level {
				--offset: 391px;

				width: 71px;
			}

			.hearts {
				bottom: -676px;
				padding: 9px 6px;
				height: unset;
				width: 28px;
				font-size: 0px;
				display: flex;
				flex-direction: column-reverse;
				gap: 9px;
			}

			.hearts span {
				image-rendering: pixelated;
				width: 28px;
				height: 28px;
				overflow: hidden;
				background: url(/views/heart_grey.png);
				background-size: contain;
				background-repeat: no-repeat;
				background-position: center;
				display: inline-block;
			}

			.hearts span.win {
				background-image: url(/views/heart_red.png);
			}

			.level,
			.tetris_rate {
				height: 56px;
			}

			.level {
				top: 166px;

				font-size: 26px;

				align-items: center;
				flex-direction: column;
				display: flex;

				gap: 8px;
			}

			.lines .header,
			.lines .content,
			.level .header,
			.level .content {
				padding-left: 4px;
			}

			.tetris_rate,
			.drought {
				top: 667px;
				width: 66px;
				height: 53px;
				padding: 3px 2px 3px 5px;

				font-size: 20px;
			}

			.tetris_rate .header,
			.drought .header {
				padding-bottom: 4px;
			}

			.drought {
				color: red;
				display: none;
			}

			.drought.active {
				display: block;
				animation: 0.5s ease-out fadeIn;
			}

			.drought .header img {
				padding-top: 3px;
				margin-left: -2px;
				vertical-align: top;
				animation: 1s linear infinite fadeOut;
			}

			.p2 > * {
				left: var(--offset);
			}

			.player_vid {
				--offset: 400px;

				position: absolute;
				top: 0;
				width: 560px;
				height: 673px;
				padding: 0;
				object-fit: cover;
			}

			.divider {
				position: absolute;
				left: -6px;
				width: 12px;
				height: 828px;
				color: #f8e889;
				font-size: 22px;
				padding-left: 1px;

				display: flex;
				align-items: center;
				justify-content: center;
			}
		</style>
	</head>
	<body>
		<template id="player">
			<div class="player">
				<video class="player_vid"></video>

				<div class="box hearts">&#338;</div>

				<div class="box lines">
					<div class="header">LINES</div>
					<div class="content">000</div>
				</div>

				<div class="box level">
					<div class="header">LV</div>
					<div class="content">00</div>
				</div>

				<div class="box next_piece"></div>

				<div class="box tetris_rate">
					<div class="header">TRT</div>
					<div class="content">---</div>
				</div>

				<div class="box drought">
					<div class="header"><img src="/views/red_bar.png" /></div>
					<div class="value">99</div>
				</div>

				<div class="box-container score">
					<div class="box">
						<div class="aligner">
							<div class="value">0&#x202F;000&#x202F;000</div>
							<div class="diff">0&#x202F;000&#x202F;000</div>
						</div>
						<div class="tetris_diff">
							<span class="value">0.00</span>&#x202F;TETRIS
						</div>
					</div>
				</div>

				<div class="box board"></div>
			</div>
		</template>

		<div id="stream_bg">
			<div id="playing_fields">
				<!-- divider -->
				<div class="divider">v</div>

				<!-- Player 1 -->
				<!-- Player 2 -->
			</div>
			<!-- End Playing Fields -->
			<div class="ticker"></div>
		</div>
		<!-- End Stream BG -->

		<!-- Audio -->

		<script>
			// custom view parameters which will be passed in the websocket URI
			const view_meta = new URLSearchParams({
				video: '1280x720', // urgh, so big for so much space wasted :(
			});
		</script>
		<script src="/vendor/peerjs.1.5.5.min.js"></script>
		<script type="module">
			import '/views/bg.js';
			import { peerServerOptions } from '/views/constants.js';
			import { translate, readableScoreFomatter } from '/views/utils.js';
			import QueryString from '/js/QueryString.js';
			import CTMCompetitionPlayer from '/views/CTMCompetitionPlayer.js';
			import Competition from '/views/competition.js';

			// supply 0 to disable
			const CYCLE_TDIFF = /^\d+$/.test(QueryString.get('cycle_tdiff'))
				? parseInt(QueryString.get('cycle_tdiff'), 10)
				: 5; // default cycle is 5s

			const players_node = document.querySelector('#playing_fields');
			const player_template = document.getElementById('player');
			const players = [1, 2].map(num => {
				const player_fragment = document.importNode(
					player_template.content,
					true
				);
				const player_node = player_fragment.querySelector('.player');

				player_node.classList.add(`p${num}`);
				players_node.appendChild(player_node);

				const player = new CTMCompetitionPlayer(
					{
						score: player_node.querySelector(`.score .value`),
						level: player_node.querySelector(`.level .content`),
						lines: player_node.querySelector(`.lines .content`),
						trt: player_node.querySelector(`.tetris_rate .content`),
						drought: player_node.querySelector(`.drought .value`),
						preview: player_node.querySelector(`.next_piece`),
						field: player_node.querySelector(`.board`),

						diff: player_node.querySelector(`.score .diff`),
						t_diff: player_node.querySelector(`.score .tetris_diff .value`),

						score_box: player_node.querySelector(`.score`),
						drought_box: player_node.querySelector(`.drought`),
						hearts: player_node.querySelector(`.hearts.box`),
						video: player_node.querySelector(`.player_vid`),
					},
					{
						running_trt_dot_size: 5,
						format_score: v => readableScoreFomatter(v),
						stereo: translate([1, 2], [-1, 1], num),
					}
				);

				if (!CYCLE_TDIFF) {
					player_node.querySelector(`.score .tetris_diff`)?.remove();
				}

				// Undo the CTM logic of hiding the level and preview
				delete player.onGameOver;

				player.onDroughtStart = () => {
					player.dom.drought_box.classList.add('active');
				};

				player.onDroughtEnd = () => {
					player.dom.drought_box.classList.remove('active');
				};

				player.onGameStart = () => {
					player.onDroughtEnd();
				};

				return player;
			});

			if (CYCLE_TDIFF) {
				setInterval(() => {
					players.forEach(player => {
						player.dom.score_box.classList.toggle('with_tdiff');
					});
				}, CYCLE_TDIFF * 1000);

				// initialize inverted tetris diff displays for 1
				players[0].dom.score_box.classList.add('with_tdiff');
			}

			const competition = new Competition(players);

			window.players = players;
		</script>
	</body>
</html>
